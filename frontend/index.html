<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare ML System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box {
            background: white;
            border-radius: 16px;
            padding: 60px 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #2d3748; margin-bottom: 12px; }
        p { color: #718096; font-size: 15px; line-height: 1.6; margin-bottom: 35px; }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background: #5a67d8; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon"></div>
        <h1>Healthcare Test Result Predictor</h1>
        <p>
            This system uses machine learning to predict patient 
            test results as <strong>Normal</strong>, <strong>Abnormal</strong>, 
            or <strong>Inconclusive</strong> based on patient information.
        </p>
        <a href="/frontend/predict.html" class="btn">
            Get Started →
        </a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict - Healthcare ML</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 25px 30px;
            width: 100%;
            max-width: 780px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .back {
            color: #667eea;
            text-decoration: none;
            font-size: 15px;
            display: inline-block;
            margin-bottom: 10px;
        }
        h2 { color: #2d3748; font-size: 22px; margin-bottom: 3px; }
        .sub { color: #718096; font-size: 14px; margin-bottom: 15px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group { display: flex; flex-direction: column; }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 4px;
        }
        input, select {
            padding: 9px 11px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }
        .btn:hover { background: #5a67d8; }
        #result {
            display: none;
            margin-top: 12px;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .Normal { background: #f0fff4; color: #276749; border: 2px solid #68d391; }
        .Abnormal { background: #fff5f5; color: #9b2c2c; border: 2px solid #fc8181; }
        .Inconclusive { background: #fffff0; color: #744210; border: 2px solid #f6e05e; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to Home</a>
        <h2>Predict Test Result</h2>
        <p class="sub">Enter patient details below to get an instant prediction</p>

        <div class="grid">
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" value="45">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Blood Type</label>
                <select id="blood_type">
                    <option>A+</option><option>A-</option>
                    <option>B+</option><option>B-</option>
                    <option>O+</option><option>O-</option>
                    <option>Ab+</option><option>Ab-</option>
                </select>
            </div>
            <div class="form-group">
                <label>Medical Condition</label>
                <select id="medical_condition">
                    <option>Diabetes</option>
                    <option>Hypertension</option>
                    <option>Asthma</option>
                    <option>Cancer</option>
                    <option>Obesity</option>
                    <option>Arthritis</option>
                </select>
            </div>
            <div class="form-group">
                <label>Admission Type</label>
                <select id="admission_type">
                    <option>Emergency</option>
                    <option>Elective</option>
                    <option>Urgent</option>
                </select>
            </div>
            <div class="form-group">
                <label>Insurance Provider</label>
                <select id="insurance_provider">
                    <option>Cigna</option>
                    <option>Aetna</option>
                    <option>Medicare</option>
                    <option>Unitedhealth</option>
                    <option>Bluecross</option>
                </select>
            </div>
            <div class="form-group">
                <label>Medication</label>
                <select id="medication">
                    <option>Aspirin</option>
                    <option>Ibuprofen</option>
                    <option>Penicillin</option>
                    <option>Paracetamol</option>
                    <option>Lipitor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Billing Amount ($)</label>
                <input type="number" id="billing_amount" value="2000">
            </div>
            <div class="form-group">
                <label>Length of Stay (days)</label>
                <input type="number" id="length_of_stay" value="7">
            </div>
        </div>

        <button class="btn" onclick="predict()">Predict →</button>
        <div id="result"></div>
    </div>

    <script>
        async function predict() {
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "none";

            const data = {
                Age: parseInt(document.getElementById("age").value),
                Gender: document.getElementById("gender").value,
                Blood_Type: document.getElementById("blood_type").value,
                Medical_Condition: document.getElementById("medical_condition").value,
                Billing_Amount: parseFloat(document.getElementById("billing_amount").value),
                Admission_Type: document.getElementById("admission_type").value,
                Insurance_Provider: document.getElementById("insurance_provider").value,
                Medication: document.getElementById("medication").value,
                Length_of_Stay: parseInt(document.getElementById("length_of_stay").value)
            };

            try {
                const res = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                const label = result.predicted_test_result;
                resultDiv.style.display = "block";
                resultDiv.className = label;
                resultDiv.textContent =
                    label === "Normal" ? "Normal" :
                    label === "Abnormal" ? "Abnormal" :
                    " Inconclusive";
            } catch (err) {
                resultDiv.style.display = "block";
                resultDiv.style.background = "#fff5f5";
                resultDiv.textContent = "Error connecting to API";
            }
        }
    </script>
</body>
</html>
